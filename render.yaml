services:
  # Python 네이티브 배포 서비스
  - name: cvfactory
    type: web
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn cvfactory.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - fromGroup: cvfactory-env
    healthCheckPath: /
    plan: free

databases:
  - name: cvfactory-db
    databaseName: cvfactory
    user: cvfactory
    plan: free 