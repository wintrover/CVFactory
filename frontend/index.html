{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
<title>CVFactory - AI 자기소개서 생성 서비스</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="CVFactory를 통해 AI 기반으로 맞춤형 자기소개서를 빠르게 작성해보세요. 채용공고와 나의 스토리를 입력하면 최적화된 자기소개서를 생성합니다.">
<meta name="keywords" content="자기소개서, 이력서, AI 자기소개서, 취업, 채용, 커리어">
<meta name="author" content="CVFactory">
<meta property="og:title" content="CVFactory - 자기소개서 자동 생성 서비스">
<meta property="og:description" content="AI가 채용공고에 최적화된 맞춤형 자기소개서를 생성해줍니다.">
<meta property="og:image" content="{% static 'favicon-32x32.png' %}">
<meta property="og:url" content="https://cvfactory.kr">
<meta name="twitter:card" content="summary_large_image">
<meta name="naver-site-verification" content="5c33cb08474ec4a3a63245f8cf9e38ffd476b472" />

<!-- 모바일 최적화 메타 태그 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">

<!-- 국내 검색엔진 최적화 -->
<meta name="naver-site-verification" content="네이버_사이트_인증_코드"> <!-- 실제 인증 코드로 변경 필요 -->
<meta property="al:ios:url" content="https://cvfactory.kr/">
<meta property="al:ios:app_name" content="CVFactory">
<meta property="al:android:url" content="https://cvfactory.kr/">
<meta property="al:android:app_name" content="CVFactory">
<meta property="al:web:url" content="https://cvfactory.kr/">

<!-- 파비콘 설정 -->
<link rel="apple-touch-icon" href="{% static 'apple-touch-icon.png' %}">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}">
<link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}">
<link rel="manifest" href="{% static 'site.webmanifest' %}">
<link rel="icon" href="{% static 'favicon.ico' %}">
<link rel="shortcut icon" href="{% static 'favicon.ico' %}">

<link rel="stylesheet" href="{% static 'style.css' %}">
<script>
    window.API_KEY = '{{ api_key }}';  // Django 템플릿 변수로 API 키 전달
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
<script src="{% static 'script.js' %}"></script>

<!-- 구조화된 데이터(JSON-LD) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "CVFactory",
  "url": "https://cvfactory.kr",
  "description": "채용공고와 나의 스토리를 입력하면 AI가 맞춤형 자기소개서를 생성해주는 서비스",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "Web",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "KRW"
  },
  "creator": {
    "@type": "Organization",
    "name": "CVFactory",
    "url": "https://cvfactory.kr",
    "logo": "https://cvfactory.kr{% static 'favicon-32x32.png' %}"
  },
  "inLanguage": "ko-KR",
  "audience": {
    "@type": "Audience",
    "geographicArea": {
      "@type": "Country", 
      "name": "South Korea"
    }
  },
  "applicationCategory": "BusinessApplication",
  "applicationSubCategory": "자기소개서"
}
</script>

<!-- 지역 비즈니스 정보 구조화 데이터 -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "CVFactory",
  "url": "https://cvfactory.kr",
  "logo": "https://cvfactory.kr{% static 'favicon-32x32.png' %}",
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "KR",
    "addressRegion": "서울특별시"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "contactType": "customer service",
    "email": "contact@cvfactory.kr"
  }
}
</script>
</head>
<body>
<header>
  <div style="font-weight:bold">
    CVFactory
  </div>
  <div>
    <!-- <button class="black-btn" onclick="loginWithGoogle()">로그인</button>
    <button class="white-btn">회원가입</button> -->
  </div>
</header>

<main>
  <h1>자기소개서를 만들기 위해 지원하려는 채용정보를 알려주세요!</h1>

  <!-- 전체 화면 블러 & 로딩 애니메이션 -->
  <div id="loading-overlay" style="display: none;">
    <div id="lottie-container" 
        data-animation="{% static 'lottie/factory-loading.json' %}"
        style="width: 200px; height: 200px;">
    </div>
    <p>자기소개서를 생성하는 중입니다... </p>
    <p>(최대 3분 정도 소요될 수 있습니다)</p>
  </div>

  <!-- 프롬프트 레이아웃 컨테이너 -->
  <div class="prompt-container" style="width: 95%; max-width: 1200px;">
    <!-- 왼쪽 열: 3개의 작은 프롬프트 -->
    <div class="left-column">
      <!-- 프롬프트 1 -->
      <div class="chat-box small-prompt">
        <textarea id="job_url" placeholder="채용공고 URL을 입력하세요."></textarea>
      </div>
      
      <!-- 프롬프트 2 -->
      <div class="chat-box small-prompt">
        <textarea id="company_url" placeholder="지원하고자 하는 회사의 홈페이지를 입력하세요."></textarea>
      </div>
      
      <!-- 프롬프트 3 -->
      <div class="chat-box">
        <textarea id="user_story" placeholder="나의 스토리를 적어주세요."></textarea>
      </div>
    </div>
    
    <!-- 오른쪽 열: 1개의 큰 프롬프트 -->
    <div class="right-column" style="flex: 1.5;">
      <!-- 프롬프트 4 -->
      <div class="chat-box large-prompt">
        <div>
          <textarea id="generated_resume" placeholder="완성된 자기소개서가 여기에 표시됩니다." class="large-textarea"></textarea>
          <div class="actions">
            <button type="button" onclick="generateResume()" class="black-btn">작성하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
