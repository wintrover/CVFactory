<!-- Critical CSS를 인라인으로 포함 - LCP 최적화 -->
<style>
/* 핵심 스타일 (Critical CSS) - 첫 화면에 보이는 요소만 포함 */
body {
  font-family: sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-y: auto;
}
header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-bottom: 1px solid #eee;
}
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px;
}
main .page-title {
  text-align: center;
  margin-bottom: 30px;
  font-size: 1.8rem;
  font-weight: bold;
}
#loading-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(5px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  contain: layout size;
}
.prompt-container {
  width: 95%;
  max-width: 1200px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 20px;
  contain: layout;
  min-height: 400px;
}

/* 터치 영역 최적화 */
.chat-box textarea,
.actions button {
  min-height: 44px;
  min-width: 44px;
  padding: 10px;
}

/* CLS 최적화 - 이미지 영역 사전 설정 */
.image-container {
  aspect-ratio: 1 / 1;
  width: 100%;
  max-width: 200px;
  background-color: #f0f0f0;
}

/* 로딩 애니메이션 컨테이너 크기 고정 - CLS 최적화 */
#lottie-container {
  width: 200px;
  height: 200px;
  contain: layout paint size;
}

/* 텍스트 영역 크기 고정 - CLS 최적화 */
.chat-box textarea {
  min-height: 100px;
  height: 100%;
  contain: content;
}

/* 대형 텍스트 영역 크기 고정 - CLS 최적화 */
.large-textarea {
  min-height: 300px;
  height: 100%;
  contain: content;
}

/* 렌더링 최적화 CSS - GPU 가속 */
.gpu-accelerated {
  transform: translateZ(0);
  will-change: transform;
}

/* 화면 밖 콘텐츠 렌더링 최적화 */
.content-visibility-auto {
  content-visibility: auto;
  contain-intrinsic-size: 1px 5000px;
}

/* 모바일 최적화 인라인 CSS */
@media (max-width: 768px) {
  main .page-title {
    font-size: 1.4rem;
    margin-bottom: 16px;
    padding: 0 5px;
    line-height: 1.3;
    font-weight: normal;
  }
  
  main .title-part {
    display: block;
    line-height: 1.3;
    margin-bottom: 2px;
  }
  
  textarea {
    font-size: 16px; /* iOS에서 확대 방지 */
  }
}

/* 불필요한 애니메이션 최소화 */
@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* 폰트 FOUT 방지 - CLS 최적화 */
html {
  font-display: optional;
}
</style>

<!-- 메인 스타일시트 지연 로딩 -->

<!-- 페인트 타이밍 API 활성화 - 성능 측정 -->
<script>
  // 성능 측정을 위한 코드
  if (window.PerformanceObserver) {
    const perfObserver = new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        // 콘솔에 성능 지표 로깅
        console.log('LCP:', entry.startTime, entry);
      }
    });
    perfObserver.observe({type: 'largest-contentful-paint', buffered: true});
  }
</script>

<script>
    window.API_KEY = '{{ api_key }}';  // Django 템플릿 변수로 API 키 전달

<!-- FID 최적화 - 스크립트 최적화 -->
<script type="module">
  // 중요 기능만 즉시 로드
  document.addEventListener('DOMContentLoaded', () => {
    const generateButton = document.querySelector('button.black-btn');
    if (generateButton) {
      generateButton.addEventListener('click', () => {
        // 필수 클릭 이벤트만 즉시 처리
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'flex';
        
        // 기존 함수 호출 (스크립트 모듈화 미지원 시)
        if (typeof window.generateResume === 'function') {
          window.generateResume();
        }
      });
    }
  });
</script>
