version: '3.8'

services:
  web:
    build: .
    command: sh -c "python manage.py makemigrations ; python manage.py migrate ; gunicorn cvfactory_project.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$${PORT:-8000}"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env # .env 파일 사용 명시
    environment:
      # .env 파일과 중복될 수 있는 변수들은 여기서 제거하거나, docker-compose에서 오버라이드할 변수만 남깁니다.
      # 예를 들어, DEBUG, SECRET_KEY, API_KEY 등은 .env에서 관리
      # DATABASE_URL은 서비스 간 연결을 위해 여기서 정의하거나 .env에 정의하고 여기서 참조할 수 있습니다.
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # PORT는 Gunicorn 실행 시 사용되므로 .env 또는 여기서 설정
      # DEPLOYMENT_SHA도 .env 또는 여기서 설정
    depends_on:
      db:
        condition: service_healthy # db 서비스가 healthy 상태가 될 때까지 대기

  db:
    image: postgres:13-alpine # PostgreSQL 버전은 필요에 따라 조정
    container_name: cvfactory_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env # db 서비스도 .env 파일의 POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB 등을 사용
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432" # 호스트에서 직접 접근이 필요하면 주석 해제

volumes:
  postgres_data: 