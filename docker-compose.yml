version: '3.8'

services:
  web:
    build: .
    command: >
      sh -c "python manage.py makemigrations ; 
             python manage.py migrate ; 
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=your_secret_key_for_development # 실제 값으로 변경하세요.
      - DEBUG=True
      - API_KEY=your_dev_api_key # 실제 값으로 변경하세요.
      - DEPLOYMENT_SHA=localdev
      - DATABASE_URL=postgres://cvfactory_user:cvfactory_password@db:5432/cvfactory_db
    depends_on:
      - db

  db:
    image: postgres:13-alpine # PostgreSQL 버전은 필요에 따라 조정
    container_name: cvfactory_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=cvfactory_user
      - POSTGRES_PASSWORD=cvfactory_password # 실제 프로덕션에서는 더 강력한 암호를 사용하세요.
      - POSTGRES_DB=cvfactory_db
    ports:
      - "5432:5432" # 로컬에서 직접 DB 접근이 필요한 경우 (선택적)

volumes:
  postgres_data: 